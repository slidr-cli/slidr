<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ title }}</title>
<style>
{{ css }}
</style>
</head>
<body>
{% for slide in slides %}
<section class="slide layout-{{ slide.layout }}"{% if slide.notes %} data-notes="{{ slide.notes }}"{% endif %}>
{{ slide.children }}
{% if slide.footer or slide.paginate %}<footer>{{ slide.footer }}{% if slide.paginate %}{% if slide.footer %} - {% endif %}{{ slide.num }}{% endif %}</footer>{% endif %}
</section>
{% endfor %}

<div id="slidr-nav">
  <button id="slidr-prev" title="Previous (Left arrow)">&larr;</button>
  <span id="slidr-counter">1 / {{ slides|length }}</span>
  <button id="slidr-next" title="Next (Right arrow)">&rarr;</button>
  <button id="slidr-fullscreen" title="Toggle fullscreen (f)">&#9974;</button>
  <button id="slidr-presenter" title="Open presenter view (p)">&#9654;</button>
</div>

<script>
{% include "slidr.js" %}
</script>
</body>
</html>
