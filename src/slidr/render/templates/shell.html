<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{title}</title>
<style>
/* ---- reset ---- */
*, *::before, *::after {{ box-sizing: border-box; margin: 0; padding: 0; }}

/* ---- layout defaults (theme overrides these) ---- */
section {{
  font-size: 18pt;
}}

p {{
  margin-bottom: 0.5em;
}}

h2, h3 {{
  margin-bottom: 0.5em;
}}

.grid {{ display: grid; gap: 1em; }}

.card {{
  border-radius: 0.4em;
  padding: 1em;
}}

.card h3 {{
  margin-bottom: 0.5em;
}}

.card p {{
  margin-bottom: 0.5em;
}}
.card p:last-child {{
  margin-bottom: 0;
}}

.quote {{
  border-left: 0.25em solid;
  padding-left: 1em;
}}

.kicker {{ font-family: monospace; font-size: 0.8em; font-weight: 800; }}
.speaker {{ font-size: 1.05em; font-weight: 750; margin-top: 3em }}
.speaker .role {{ color: var(--color-dimmed, #999); }}

table {{ border-collapse: collapse; width: 100%; margin: 0.5em 0; }}
th, td {{ padding: 0.5em 0.65em; text-align: left; vertical-align: top; }}

footer {{
  position: absolute;
  bottom: 1em;
  right: 3em;
  text-align: right;
}}

/* ---- theme ---- */
{theme_css}

{logo_css}

/* ---- screen mode ---- */
@media screen {{
  html, body {{
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #111;
  }}
  body > section {{
    display: none !important;
    position: absolute;
    top: 50%;
    left: 50%;
    width: {slide_w}px;
    height: {slide_h}px;
    transform-origin: center center;
    transform: translate(-50%, -50%) scale(var(--s));
    overflow: hidden !important;
  }}
  body > section.active {{
    display: block !important;
  }}
  .layout-title {{
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-top: 10%;
  }}
  .layout-title h1 {{
    font-size: 3.5em;
  }}
  .layout-title .subtitle {{
    margin-bottom: 0.3em;
    font-size: 1.8em;
  }}
  h2 {{
    padding-top: 4%;
    margin-bottom: 1em;
  }}
}}

/* ---- print mode ---- */
@media print {{
  @page {{
    size: {slide_w}px {slide_h}px;
    margin: 0;
  }}
  html, body {{
    margin: 0;
    padding: 0;
  }}
  body > section {{
    width: {slide_w}px;
    height: {slide_h}px;
    page-break-after: always;
    overflow: hidden !important;
  }}
  body > section:last-child {{
    page-break-after: avoid;
  }}
  #slidr-nav {{
    display: none !important;
  }}
}}

/* ---- nav bar (screen only) ---- */
#slidr-nav {{
  display: none;
}}
@media screen {{
  #slidr-nav {{
    display: flex;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 27pt;
    align-items: center;
    justify-content: center;
    gap: 12pt;
    background: rgba(0,0,0,0.7);
    color: #aaa;
    font-family: system-ui, sans-serif;
    font-size: 10pt;
    z-index: 1000;
    user-select: none;
  }}
  #slidr-nav button {{
    background: none;
    border: 1px solid #555;
    color: #ccc;
    padding: 2pt 9pt;
    border-radius: 3pt;
    cursor: pointer;
    font-size: 10pt;
  }}
  #slidr-nav button:hover {{
    background: rgba(255,255,255,0.1);
    color: #fff;
  }}
  #slidr-nav button:disabled {{
    opacity: 0.3;
    cursor: default;
  }}
  #slidr-nav span {{
    min-width: 45pt;
    text-align: center;
  }}
}}
</style>
</head>
<body>
{slides}

<div id="slidr-nav">
  <button id="slidr-prev" title="Previous (Left arrow)">&larr;</button>
  <span id="slidr-counter">1 / 1</span>
  <button id="slidr-next" title="Next (Right arrow)">&rarr;</button>
  <button id="slidr-fullscreen" title="Toggle fullscreen (f)">&#9974;</button>
</div>

<script>
(function() {{
  var slides = document.querySelectorAll('body > section');
  var total = slides.length;
  if (total === 0) return;
  var current = 0;
  var counter = document.getElementById('slidr-counter');
  var prevBtn = document.getElementById('slidr-prev');
  var nextBtn = document.getElementById('slidr-next');

  function setScale() {{
    var sw = {slide_w}, sh = {slide_h};
    var scale = Math.min(window.innerWidth / sw, window.innerHeight / sh);
    document.documentElement.style.setProperty('--s', scale);
  }}
  setScale();
  window.addEventListener('resize', setScale);

  function show(n) {{
    if (n < 0 || n >= total) return;
    slides[current].classList.remove('active');
    current = n;
    slides[current].classList.add('active');
    counter.textContent = (current + 1) + ' / ' + total;
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === total - 1;
  }}

  show(0);

  prevBtn.addEventListener('click', function() {{ show(current - 1); }});
  nextBtn.addEventListener('click', function() {{ show(current + 1); }});

  var fsBtn = document.getElementById('slidr-fullscreen');
  fsBtn.addEventListener('click', function() {{
    if (!document.fullscreenElement) {{
      document.documentElement.requestFullscreen();
    }} else {{
      document.exitFullscreen();
    }}
  }});

  document.addEventListener('keydown', function(e) {{
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') {{
      e.preventDefault(); show(current - 1);
    }} else if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {{
      e.preventDefault(); show(current + 1);
    }} else if (e.key === 'Home') {{
      e.preventDefault(); show(0);
    }} else if (e.key === 'End') {{
      e.preventDefault(); show(total - 1);
    }} else if (e.key === 'f') {{
      if (!document.fullscreenElement) {{
        document.documentElement.requestFullscreen();
      }} else {{
        document.exitFullscreen();
      }}
    }}
  }});
}})();
</script>
</body>
</html>
