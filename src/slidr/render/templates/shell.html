<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{title}</title>
<style>
{css}
</style>
</head>
<body>
{slides}

<div id="slidr-nav">
  <button id="slidr-prev" title="Previous (Left arrow)">&larr;</button>
  <span id="slidr-counter">1 / 1</span>
  <button id="slidr-next" title="Next (Right arrow)">&rarr;</button>
  <button id="slidr-fullscreen" title="Toggle fullscreen (f)">&#9974;</button>
  <button id="slidr-presenter" title="Open presenter view (p)">&#9654;</button>
</div>

<script>
(function() {{
  var slides = document.querySelectorAll('body > section');
  var total = slides.length;
  if (total === 0) return;
  var current = 0;
  var counter = document.getElementById('slidr-counter');
  var prevBtn = document.getElementById('slidr-prev');
  var nextBtn = document.getElementById('slidr-next');
  var presenterWindow = null;

  function setScale() {{
    var sw = {slide_w}, sh = {slide_h};
    var scale = Math.min(window.innerWidth / sw, window.innerHeight / sh);
    document.documentElement.style.setProperty('--s', scale);
  }}
  setScale();
  window.addEventListener('resize', setScale);

  function show(n) {{
    if (n < 0 || n >= total) return;
    slides[current].classList.remove('active');
    current = n;
    slides[current].classList.add('active');
    counter.textContent = (current + 1) + ' / ' + total;
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === total - 1;
  }}

  show(0);

  prevBtn.addEventListener('click', function() {{ show(current - 1); }});
  nextBtn.addEventListener('click', function() {{ show(current + 1); }});

  var fsBtn = document.getElementById('slidr-fullscreen');
  fsBtn.addEventListener('click', function() {{
    if (!document.fullscreenElement) {{ document.documentElement.requestFullscreen(); }}
    else {{ document.exitFullscreen(); }}
  }});

  document.addEventListener('keydown', function(e) {{
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') {{
      e.preventDefault(); show(current - 1);
    }} else if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {{
      e.preventDefault(); show(current + 1);
    }} else if (e.key === 'Home') {{
      e.preventDefault(); show(0);
    }} else if (e.key === 'End') {{
      e.preventDefault(); show(total - 1);
    }} else if (e.key === 'f') {{
      if (!document.fullscreenElement) {{ document.documentElement.requestFullscreen(); }}
      else {{ document.exitFullscreen(); }}
    }}
  }});

  document.getElementById('slidr-presenter').addEventListener('click', function() {{
    if (presenterWindow && !presenterWindow.closed) {{ presenterWindow.focus(); return; }}
    presenterWindow = window.open('', 'slidr-presenter', 'width=1280,height=720');
    var notes = [];
    for (var i = 0; i < slides.length; i++) {{ notes.push(slides[i].getAttribute('data-notes') || ''); }}
    presenterWindow.document.write(
      '<!DOCTYPE html><html><head><meta charset=utf-8><title>Presenter</title><style>' +
      '*{{margin:0;padding:0;box-sizing:border-box}}' +
      'body{{display:grid;grid-template-columns:1fr 0.5fr;grid-template-rows:1fr auto;height:100vh;background:#111;color:#eee;font-family:sans-serif;font-size:13px}}' +
      '#main{{grid-column:1;grid-row:1/3;display:flex;align-items:center;justify-content:center;overflow:hidden}}' +
      '#main section{{display:none;width:100%;height:100%;overflow:hidden}}' +
      '#main section.active{{display:block}}' +
      '#notes{{grid-column:2;grid-row:2;padding:1em;color:#aaa;border-top:1px solid #333;max-height:25vh;overflow-y:auto;white-space:pre-wrap}}' +
      '#next{{grid-column:2;grid-row:1;display:flex;align-items:center;justify-content:center;overflow:hidden;border-left:1px solid #333}}' +
      '#next section{{display:none;width:100%;height:100%;overflow:hidden}}' +
      '#next section.active{{display:block}}' +
      '</style></head><body>' +
      '<div id=main>' + document.querySelector('body').innerHTML + '</div>' +
      '<div id=next>' + document.querySelector('body').innerHTML + '</div>' +
      '<div id=notes></div>' +
      '<script>' +
      'var notes=' + JSON.stringify(notes) + ';' +
      'var ms=document.querySelectorAll("#main section");' +
      'var ns=document.querySelectorAll("#next section");' +
      'var nd=document.getElementById("notes");' +
      'function sync(n){{' +
        'ms[n].classList.add("active");' +
        'if(n+1<ns.length){{ns[n+1].classList.add("active");}}' +
        'nd.textContent=notes[n]||"No notes";' +
      '}}' +
      'setInterval(function(){{' +
        'var cn=window.opener&&window.opener.slidrCurrent;' +
        'if(cn!==undefined){{' +
          'ms.forEach(function(s){{s.classList.remove("active")}});' +
          'ns.forEach(function(s){{s.classList.remove("active")}});' +
          'sync(cn);' +
        '}}' +
      '}},300);sync(0);' +
      '<\\/script></body></html>'
    );
  }});

  window.slidrCurrent = 0;
  var _origShow = show;
  show = function(n) {{ _origShow(n); window.slidrCurrent = n; }};

}})();
</script>
</body>
</html>
