<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ title }}</title>
<style>
{{ css }}
</style>
</head>
<body>
{% for slide in slides %}
<section class="slide layout-{{ slide.layout }}"{% if slide.notes %} data-notes="{{ slide.notes }}"{% endif %}>
{{ slide.children }}
{% if slide.footer or slide.paginate %}<footer>{{ slide.footer }}{% if slide.paginate %}{% if slide.footer %} - {% endif %}{{ slide.num }}{% endif %}</footer>{% endif %}
</section>
{% endfor %}

<div id="slidr-nav">
  <button id="slidr-prev" title="Previous (Left arrow)">&larr;</button>
  <span id="slidr-counter">1 / {{ slides|length }}</span>
  <button id="slidr-next" title="Next (Right arrow)">&rarr;</button>
  <button id="slidr-fullscreen" title="Toggle fullscreen (f)">&#9974;</button>
  <button id="slidr-presenter" title="Open presenter view (p)">&#9654;</button>
</div>

<script>
(function() {
  var slides = document.querySelectorAll('body > section');
  var total = slides.length;
  if (total === 0) return;
  var current = 0;
  var counter = document.getElementById('slidr-counter');
  var prevBtn = document.getElementById('slidr-prev');
  var nextBtn = document.getElementById('slidr-next');
  var presenterWindow = null;

  function setScale() {
    var sw = {{ slide_w }}, sh = {{ slide_h }};
    var scale = Math.min(window.innerWidth / sw, window.innerHeight / sh);
    document.documentElement.style.setProperty('--s', scale);
  }
  setScale();
  window.addEventListener('resize', setScale);

  function show(n) {
    if (n < 0 || n >= total) return;
    slides[current].classList.remove('active');
    current = n;
    slides[current].classList.add('active');
    counter.textContent = (current + 1) + ' / ' + total;
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === total - 1;
  }

  show(0);

  prevBtn.addEventListener('click', function() { show(current - 1); });
  nextBtn.addEventListener('click', function() { show(current + 1); });

  var fsBtn = document.getElementById('slidr-fullscreen');
  fsBtn.addEventListener('click', function() {
    if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); }
    else { document.exitFullscreen(); }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') {
      e.preventDefault(); show(current - 1);
    } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {
      e.preventDefault(); show(current + 1);
    } else if (e.key === 'Home') {
      e.preventDefault(); show(0);
    } else if (e.key === 'End') {
      e.preventDefault(); show(total - 1);
    } else if (e.key === 'f') {
      if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); }
      else { document.exitFullscreen(); }
    }
  });

  document.getElementById('slidr-presenter').addEventListener('click', function() {
    if (presenterWindow && !presenterWindow.closed) { presenterWindow.focus(); return; }
    var pUrl = window.location.pathname.replace('.html', '.presenter.html');
    presenterWindow = window.open(pUrl, 'slidr-presenter', 'width=1280,height=720');
  });

  window.slidrCurrent = 0;
  var _origShow = show;
  show = function(n) { _origShow(n); window.slidrCurrent = n; };

})();
</script>
</body>
</html>
