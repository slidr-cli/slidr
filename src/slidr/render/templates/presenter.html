<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Presenter - {{ title }}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: grid;
  grid-template-columns: 1fr 0.5fr;
  grid-template-rows: 1fr auto;
  height: 100vh;
  background: #111;
  color: #eee;
  font-family: sans-serif;
  font-size: 13px;
}
#main {
  grid-column: 1;
  grid-row: 1 / 3;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
#main section { display: none !important; width: 100%; height: 100%; overflow: hidden; }
#main section.active { display: block !important; }
#notes {
  grid-column: 2;
  grid-row: 2;
  padding: 1em;
  color: #aaa;
  border-top: 1px solid #333;
  max-height: 25vh;
  overflow-y: auto;
  white-space: pre-wrap;
}
#next {
  grid-column: 2;
  grid-row: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  overflow: hidden;
  border-left: 1px solid #333;
  padding: 1em;
}
#next section { display: none !important; width: 100%; height: auto; overflow: hidden; }
#next section.active { display: block !important; }
</style>
<style>
{{ css }}
</style>
</head>
<body>
<div id="main">
{% for slide in slides %}
<section class="slide layout-{{ slide.layout }}">{{ slide.children }}</section>
{% endfor %}
</div>
<div id="next">
{% for slide in slides %}
<section class="slide layout-{{ slide.layout }}">{{ slide.children }}</section>
{% endfor %}
</div>
<div id="notes"></div>

<script>
var notes = [{% for slide in slides %}"{{ slide.notes|e }}"{% if not loop.last %},{% endif %}{% endfor %}];
var ms = document.querySelectorAll("#main section");
var ns = document.querySelectorAll("#next section");
var nd = document.getElementById("notes");

function sync(n) {
  ms[n].classList.add("active");
  if (n + 1 < ns.length) { ns[n + 1].classList.add("active"); }
  nd.textContent = notes[n] || "No notes";
}

setInterval(function() {
  var cn = window.opener && window.opener.slidrCurrent;
  if (cn !== undefined) {
    ms.forEach(function(s) { s.classList.remove("active"); });
    ns.forEach(function(s) { s.classList.remove("active"); });
    sync(cn);
  }
}, 300);
sync(0);

window.focus();
document.getElementById('main').addEventListener('click', function() {
  window.focus();
  var op = window.opener;
  if (op && op.slidrCurrent !== undefined) {
    var next = Math.min(op.slidrCurrent + 1, ms.length - 1);
    if (next !== op.slidrCurrent) {
      ms.forEach(function(s) { s.classList.remove("active"); });
      ns.forEach(function(s) { s.classList.remove("active"); });
      sync(next);
      op.slidrCurrent = next;
    }
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'q') window.close();
});

document.addEventListener('wheel', function(e) {
  e.preventDefault();
  var op = window.opener;
  if (!op || op.slidrCurrent === undefined) return;
  var n = op.slidrCurrent + (e.deltaY > 0 ? 1 : -1);
  if (n >= 0 && n < ms.length) {
    ms.forEach(function(s) { s.classList.remove("active"); });
    ns.forEach(function(s) { s.classList.remove("active"); });
    sync(n);
    op.slidrCurrent = n;
  }
}, { passive: false });
</script>
</body>
</html>
